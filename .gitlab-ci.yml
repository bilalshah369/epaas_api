variables:
  STACK: backend
  SERVICE: epass-api

before_script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
build:
  only: [main]
  stage: build
  script:
    - docker pull $CI_REGISTRY_IMAGE:latest || true
    - docker build 
        --tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
        --tag $CI_REGISTRY_IMAGE:latest .

push2azure:
  rules:
    - if: "$CI_COMMIT_TAG =~ /(v([0-9]+[.]){2}[0-9])/"
    #  when: manual
  stage: build
  tags: [epass-azure]
  script:
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA nta.registry:3389/$SERVICE:$CI_COMMIT_TAG
    - docker image push nta.registry:3389/$SERVICE:$CI_COMMIT_TAG
    - docker rmi $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
