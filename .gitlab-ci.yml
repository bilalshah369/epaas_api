variables:
  STACK: backend
  SERVICE: nta-face-api

before_script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
build:
  only: [main]
  stage: build
  script:
    - docker pull $CI_REGISTRY_IMAGE:latest || true
    - docker build 
        --tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
        --tag $CI_REGISTRY_IMAGE:latest .

push2azure:
  rules:
    - if: "$CI_COMMIT_TAG =~ /(v([0-9]+[.]){2}[0-9])/"
    #  when: manual
  stage: build
  tags: [nta-runner]
  script:
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA nta.registry:3389/$SERVICE:$CI_COMMIT_TAG
    - docker image push nta.registry:3389/$SERVICE:$CI_COMMIT_TAG
    - docker rmi $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

deploy_to_nta:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_TAG =~ /(v([0-9]+[.]){2}[0-9])/'
  tags: [nta-runner]
  when: manual
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - echo '=== BEFORE DEPLOY ===' && docker stack services $STACK_NAME
    - echo "Listing files in $COMPOSE_FILE_PATH:"
    # Fix: use temp file in /tmp to avoid directory permission issue
    - sed "s|nta.registry:3389/$SERVICE:.*|nta.registry:3389/$SERVICE:$CI_COMMIT_TAG|g" "$COMPOSE_FILE_PATH" > /tmp/application.yml
    - cp /tmp/application.yml "$COMPOSE_FILE_PATH"
    - docker stack deploy -c $COMPOSE_FILE_PATH $STACK_NAME --with-registry-auth
    - echo '=== AFTER DEPLOY ===' && docker stack services $STACK_NAME

